<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: no zoom, full device width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Embroidery" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Embroidery" />

    <!-- Theme -->
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="msapplication-TileColor" content="#0A0E1A" />

    <meta name="description" content="Connect embroidery professionals — find work, hire talent, chat, and grow your craft business." />
    <meta property="og:title" content="Embroidery Marketplace" />
    <meta property="og:description" content="Connect embroidery professionals — find work, hire talent, chat, and grow." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />

    <title>Embroidery Marketplace</title>

    <style>
      html, body { background: #0A0E1A; margin: 0; padding: 0; }
    </style>

    <script type="module" src="/src/main.tsx"></script>
  </body>
